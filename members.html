<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Crew - Members</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00C7B2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/logo.png">
</head>
<body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h1 class="welcome">All Members</h1>
            <button id="addMemberBtn" class="logout-btn" style="background: var(--green);">
                <i class="fas fa-plus"></i> Add New Member
            </button>
        </div>

        <div class="card">
            <!-- Desktop Table -->
            <table class="members-table" id="membersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Areas</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="membersBody"></tbody>
            </table>

            <!-- Mobile Cards -->
            <div class="members-list" id="membersList"></div>
        </div>
    </div>

    <!-- Add/Edit Member Modal -->
    <div id="memberModal" class="modal">
        <div class="modal-content" style="max-width: 520px; width: 92%; max-height: 92vh; overflow: hidden; display: flex; flex-direction: column;">
    
    <!-- Header stays fixed -->
    <div class="modal-header">
        <h2 id="modalTitle">Add New Member</h2>
        <button class="close-btn" onclick="document.getElementById('memberModal').classList.remove('active')">✕</button>
    </div>

    <!-- Scrollable Form Body -->
    <div class="modal-body" style="flex: 1; overflow-y: auto; padding: 1.8rem; max-height: calc(92vh - 140px);">
        <form id="memberForm">
            <input type="hidden" id="memberId">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="role">
                    <option value="Member">Member</option>
                    <option value="Lead">Lead</option>
                    <option value="Supervisor">Supervisor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <!-- Certifications Section - Cleaner & Tighter -->
<!-- New Status Dropdowns for Each Area -->
<div class="form-group">
    <label style="display:block; margin-bottom:16px; font-weight:600;">Area Status (Certified / Training)</label>
    
    <div class="status-grid">
        <div class="status-row">
            <span class="area-name">Supervisor</span>
            <select id="supervisor_status" class="status-select">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Training">Training</option>
            </select>
        </div>
        <div class="status-row">
            <span class="area-name">LH</span>
            <select id="lh_status" class="status-select">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Training">Training</option>
            </select>
        </div>
        <div class="status-row">
            <span class="area-name">PT (Pretreat)</span>
            <select id="pt_status" class="status-select">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Training">Training</option>
            </select>
        </div>
        <div class="status-row">
            <span class="area-name">Demin</span>
            <select id="demin_status" class="status-select">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Training">Training</option>
            </select>
        </div>
        <div class="status-row">
            <span class="area-name">Field</span>
            <select id="field_status" class="status-select">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Training">Training</option>
            </select>
        </div>
        <div class="status-row">
            <span class="area-name">Comp</span>
            <select id="comp_status" class="status-select">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Training">Training</option>
            </select>
        </div>
        <div class="status-row">
            <span class="area-name">Panel</span>
            <select id="panel_status" class="status-select">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Training">Training</option>
            </select>
        </div>
    </div>
</div>

        </form>
    </div>

    <!-- Footer with buttons - stays fixed at bottom -->
    <div class="form-actions">
        <button type="button" class="cancel-btn" onclick="document.getElementById('memberModal').classList.remove('active')">Cancel</button>
        <button type="submit" form="memberForm" class="save-btn">Save Member</button>
    </div>
</div>    
    </div>

    <script src="js/app.js"></script>
</body>
</html>
