<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Crew - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00C7B2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/logo.png">
</head>
<body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="main-content" style="max-width: 680px; margin: 0 auto; padding: 20px;">
        
        <!-- Create Post Box -->
        <div class="card" style="margin-bottom: 25px;">
            <h2 style="margin-top:0;">What's happening in the crew?</h2>
            <textarea id="postContent" rows="3" placeholder="Share an update with the crew..."
                style="width:100%; padding:14px; border-radius:12px; border:1px solid rgba(0,199,178,0.3); background:rgba(255,255,255,0.08); color:white; resize:vertical; font-size:1.05rem;"></textarea>
            
            <!-- Image Upload -->
            <input type="file" id="imageUpload" accept="image/*" multiple style="margin:12px 0 8px;">
            <div id="imagePreview" class="image-preview" style="display:flex; gap:10px; flex-wrap:wrap; margin:8px 0;"></div>

            <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:10px;">
    <button onclick="createTextPost()" class="btn" style="flex:1; padding:12px; font-weight:600;">
        <i class="fas fa-paper-plane"></i> Post Update
    </button>
    
    <button onclick="showPollModal()" class="btn" 
            style="flex:1; padding:12px; font-weight:600; background:#00b894; color:white;">
        <i class="fas fa-poll-h"></i> Create Poll
    </button>
    
    <button onclick="showEventModal()" class="btn" 
            style="flex:1; padding:12px; font-weight:600; background:#e67e22; color:white;">
        <i class="fas fa-calendar-alt"></i> Schedule Event
    </button>
</div>
        </div>

        <!-- Live Feed -->
<h2 style="margin: 25px 0 15px;"><i class="fas fa-stream"></i> Live Crew Feed</h2>

<div class="sort-container">
  <label>Sort feed:</label>
  <select id="sortSelect" onchange="changeSort()">
    <option value="latest">Latest</option>
    <option value="oldest">Oldest</option>
    <option value="popular">Most Popular</option>
  </select>
</div>

<div id="feedContainer"></div>
        
    </div>

<!-- Create Poll Modal -->
<div id="pollModal" class="modal" style="display: none;">
  <div class="modal-content poll-modal-content">
    <div class="modal-header">
      <h2>Create a Poll</h2>
      <button id="closePollModal" class="close-btn">&times;</button>
    </div>
    
    <div class="poll-form">
      <div class="form-group">
        <label>Poll Question</label>
        <textarea id="pollQuestion" rows="2" placeholder="Ask the crew something..."></textarea>
      </div>

      <div class="form-group">
        <label>Poll Options</label>
        <div id="pollOptionsContainer"></div>
        <button type="button" id="addPollOptionBtn" class="add-option-btn">
          + Add another option
        </button>
      </div>
    </div>

    <div class="modal-actions">
      <button id="cancelPollBtn" class="cancel-btn">Cancel</button>
      <button id="createPollBtn" class="create-btn">Create Poll</button>
    </div>
  </div>
</div>

<!-- Event Modal -->
<div id="eventModal" class="modal" style="display: none;">
  <div class="modal-content" style="max-width: 480px;">
    <div class="modal-header">
      <h2>Schedule New Event</h2>
      <button id="closeEventModal" class="close-btn">&times;</button>
    </div>
    
    <div class="poll-form">
      <div class="form-group">
        <label>Event Title <span style="color:#ff6b6b;">*</span></label>
        <input type="text" id="eventTitle" placeholder="Crew BBQ, Safety Meeting, etc." required>
      </div>
      <div class="form-group">
        <label>Date & Time <span style="color:#ff6b6b;">*</span></label>
        <input type="datetime-local" id="eventDate" required>
      </div>
      <div class="form-group">
        <label>Location (optional)</label>
        <input type="text" id="eventLocation" placeholder="Main Hall, Zoom link, etc.">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="eventDesc" rows="3" placeholder="Any additional details..."></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button id="cancelEventBtn" class="cancel-btn">Cancel</button>
      <button id="createEventBtn" class="create-btn">Schedule Event</button>
    </div>
  </div>
</div>

    <script src="js/app.js"></script>
</body>
</html>
