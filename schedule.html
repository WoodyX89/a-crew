<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Schedule</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<!-- Navbar -->
<div id="navbar-placeholder"></div>

<div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h1 style="color: #00C7B2; margin: 0;">Crew Schedule</h1>
    
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="calendar">📅 Calendar</button>
        <button class="tab-btn" data-tab="memberchart">📊 Member Charts</button>
        <button class="tab-btn" data-tab="crewoverview">📋 Crew Overview</button>
    </div>

    <!-- TAB 1: Calendar -->
    <div id="calendar-tab" class="tab-content">
        <div class="calendar-container">
            <div class="calendar-header">
                <button id="prevMonth" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                <div id="monthYear" class="month-year"></div>
                <button id="nextMonth" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                <button id="todayBtn" class="today-btn">Today</button>
                
                <button id="autoPopulateBtn" style="background:#10b981;color:white;padding:8px 20px;border:none;border-radius:8px;font-weight:600;margin-left:12px;cursor:pointer;">
                    🔄 Auto Populate THIS Month
                </button>
                
                <button id="clearMonthBtn" style="background:#ef4444;color:white;padding:8px 20px;border:none;border-radius:8px;font-weight:600;margin-left:8px;cursor:pointer;">
                    🗑️ Clear This Month
                </button>
            </div>
            <div class="weekdays">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
                <div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
        </div>

        <!-- Day Details -->
        <div id="dayDetails" class="day-details">
            <button id="closeDetails" class="close-btn">✕</button>
            <h3 id="selectedDate"></h3>
            <div style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px;">
                <h4>Add Shift</h4>
                <select id="shiftMember" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;"></select>
                <select id="shiftStatus" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;">
                    <option value="working">Working</option>
                    <option value="vacation">OFF</option>
                </select>
                <div id="singleAreaGroup">
                    <select id="shiftArea" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;">
                        <option value="">Select Area...</option>
                    </select>
                </div>
                <button onclick="addShift()" style="width:100%; padding:12px; margin-top:12px; background:#00C7B2; color:white; border:none; border-radius:10px; font-weight:600;">
                    Add to Schedule
                </button>
            </div>
            <h4>Shifts for this day</h4>
            <div id="scheduleList" class="schedule-list"></div>
        </div>
    </div>

    <!-- TAB 2: Member Charts -->
    <div id="memberchart-tab" class="tab-content" style="display: none;">
        <div class="card">
            <h3 style="margin-bottom: 12px; color: #00C7B2;">Member Shift Breakdown</h3>
            <div style="margin-bottom: 20px; text-align: center;">
                <select id="memberChartSelect" class="dancing-select">
                    <option value="">Select Member to View Breakdown...</option>
                </select>
            </div>
            <div style="height: 420px;">
                <canvas id="memberShiftChart"></canvas>
            </div>
        </div>
    </div>

    <!-- TAB 3: Crew Overview -->
    <div id="crewoverview-tab" class="tab-content" style="display: none;">
        <div class="card">
            <h3 style="margin-bottom: 20px; color: #00C7B2;">Crew Shift Data</h3>
            <div id="memberBreakdownContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px;">
                <!-- Populated dynamically -->
            </div>
        </div>
    </div>
</div>

    <!-- Day Details -->
    <div id="dayDetails" class="day-details">
        <button id="closeDetails" class="close-btn">✕</button>
        <h3 id="selectedDate"></h3>

        <!-- Add Shift Form -->
<div style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px;">
    <h4>Add Shift</h4>
    
    <select id="shiftMember" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;"></select>
    
    <select id="shiftStatus" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;">
        <option value="working">Working</option>
        <option value="vacation">On Vacation</option>
    </select>
    
    <!-- Area dropdown (will be hidden on Vacation) -->
    <div id="singleAreaGroup">
        <select id="shiftArea" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;">
            <option value="">Select Area...</option>
        </select>
    </div>

    <button onclick="addShift()" style="width:100%; padding:12px; margin-top:12px; background:#00C7B2; color:white; border:none; border-radius:10px; font-weight:600;">
        Add to Schedule
    </button>
</div>

        <h4>Shifts for this day</h4>
        <div id="scheduleList" class="schedule-list"></div>
    </div>
</div>
<!-- BULK MODAL WITH TABS -->
<div id="bulkShiftModal" class="modal">
    <div class="modal-content bulk-modal">
        <div class="modal-header">
            <h2>Bulk Actions — Selected Days</h2>
            <button class="close-btn" onclick="hideBulkShiftModal()">✕</button>
        </div>

        <!-- Tabs -->
        <div class="bulk-tabs">
            <button class="bulk-tab-btn active" onclick="switchBulkTab(0)">Crew Assignment</button>
            <button class="bulk-tab-btn" onclick="switchBulkTab(1)">Book Time Off</button>
        </div>

        <!-- Tab Content -->
        <div id="bulkTabContent" class="modal-body">
            <!-- Crew Assignment Tab (default) -->
            <div id="crewTab" class="bulk-tab-panel">
                <p id="bulkDaysInfo" class="bulk-days-info"></p>
                <div id="areaAssignmentsContainer" class="area-assignments-container"></div>
            </div>

            <!-- Time Off Tab -->
            <div id="offTab" class="bulk-tab-panel" style="display:none;">
                <p id="offDaysInfo" class="bulk-days-info"></p>
                <p style="margin-bottom:12px; color:#94a3b8;">Select members to mark as OFF:</p>
                <div id="offMembersContainer" style="max-height:420px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        </div>

        <div class="form-actions">
            <button onclick="hideBulkShiftModal()" class="cancel-btn">Cancel</button>
            <button onclick="applyBulkAction()" class="save-btn">✅ Apply to All Selected Days</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
