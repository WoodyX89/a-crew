<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Schedule</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<!-- Navbar -->
<div id="navbar-placeholder"></div>

<div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h1 style="color: #00C7B2; margin: 0;">Crew Schedule</h1>
        <div id="totalWorking" style="background: rgba(0,199,178,0.15); padding: 8px 16px; border-radius: 20px; font-weight: 600; color: #00C7B2;">
            Total Working: <span id="workingCount">0</span>
        </div>
    </div>

    <!-- Calendar -->
    <div class="calendar-container">
        <div class="calendar-header">
            <button id="prevMonth" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
            <div id="monthYear" class="month-year"></div>
            <button id="nextMonth" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
            <button id="todayBtn" class="today-btn">Today</button>
        </div>

        <div class="weekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <!-- Day Details -->
    <div id="dayDetails" class="day-details">
        <button id="closeDetails" class="close-btn">✕</button>
        <h3 id="selectedDate"></h3>

        <!-- Add Shift Form -->
<div style="margin: 20px 0; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px;">
    <h4>Add Shift</h4>
    
    <select id="shiftMember" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;"></select>
    
    <select id="shiftStatus" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;">
        <option value="working">Working</option>
        <option value="vacation">On Vacation</option>
    </select>
    
    <!-- Area dropdown (will be hidden on Vacation) -->
    <div id="singleAreaGroup">
        <select id="shiftArea" style="width:100%; padding:12px; margin:8px 0; border-radius:8px;">
            <option value="">Select Area...</option>
        </select>
    </div>

    <button onclick="addShift()" style="width:100%; padding:12px; margin-top:12px; background:#00C7B2; color:white; border:none; border-radius:10px; font-weight:600;">
        Add to Schedule
    </button>
</div>

        <h4>Shifts for this day</h4>
        <div id="scheduleList" class="schedule-list"></div>
    </div>
</div>
<!-- Bulk Shift Modal -->
<!-- Bulk Shift Modal -->
<div id="bulkShiftModal" class="modal">
    <div class="modal-content" style="max-width: 480px;">
        <div class="modal-header">
            <h2 id="bulkModalTitle">Add Shift to Multiple Days</h2>
            <button class="close-btn" onclick="hideBulkShiftModal()">✕</button>
        </div>
        
        <div class="modal-body" style="padding: 1.8rem;">
            <p id="bulkDaysInfo" style="margin-bottom: 16px; color: #a0d8ff;"></p>
            
            <div class="form-group">
                <label>Member</label>
                <select id="bulkShiftMember" style="width:100%; padding:12px; border-radius:12px;"></select>
            </div>

            <!-- This is the ORIGINAL Area dropdown we'll hide/show -->
            <div class="form-group" id="bulkAreaGroup">
                <label>Area</label>
                <select id="bulkShiftArea" style="width:100%; padding:12px; border-radius:12px;">
                    <option value="">Select Area...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select id="bulkShiftStatus" style="width:100%; padding:12px; border-radius:12px;">
                    <option value="working">Working</option>
                    <option value="vacation">On Vacation</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="cancel-btn" onclick="hideBulkShiftModal()">Cancel</button>
            <button type="button" class="save-btn" onclick="applyBulkShift()">Apply to All Selected Days</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
