<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overtime - A Crew</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="main-content">
  <h1 style="color:#00C7B2;">Overtime Management</h1>

  <!-- OT LEADERBOARD -->
  <div class="card" style="margin-bottom: 30px;">
    <h2>OT Leaderboard <span style="font-size:0.9rem; color:#a0d8ff;">(Lowest hours first)</span></h2>
    <table id="otLeaderboard" style="width:100%; border-collapse:collapse; margin-top:12px;">
      <thead>
        <tr>
          <th style="text-align:left; padding:12px;">Member</th>
          <th style="text-align:center; padding:12px;">Total OT Hours</th>
          <th style="text-align:center; padding:12px;">Shifts</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- OPEN OT SHIFTS -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2>Open Overtime Shifts</h2>
      <button onclick="showPostOTModal()" class="add-team-btn">+ Post New OT</button>
    </div>
    <div id="openOTContainer"></div>
  </div>
</div>

<!-- Post OT Modal -->
<div id="postOTModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:520px;">
        <div class="modal-header">
            <h2>Post New Overtime Shift</h2>
            <button class="close-btn" onclick="hidePostOTModal()">✕</button>
        </div>
        
        <div style="padding:20px;">
            <input id="otDate" type="date" style="width:100%; padding:12px; margin-bottom:12px;">
            
            <select id="otShiftType" style="width:100%; padding:12px; margin-bottom:12px;">
                <option value="Day">Day Shift</option>
                <option value="Night">Night Shift</option>
                <option value="Extra">Extra / Special</option>
            </select>
            
            <select id="otArea" style="width:100%; padding:12px; margin-bottom:12px;">
                <!-- Populated by JS -->
            </select>
            
            <div style="margin-bottom:12px;">
                <label style="display:block; margin-bottom:6px; color:#a0d8ff;">Hours</label>
                <input id="otHours" type="number" value="12" min="1" max="24" step="0.5" 
                       style="width:100%; padding:12px; font-size:1.1rem;">
            </div>
            
            <textarea id="otDescription" placeholder="Notes (optional)" 
                      style="width:100%; height:90px; padding:12px; resize:vertical;"></textarea>
        </div>
        
        <div class="form-actions" style="padding:0 20px 20px;">
            <button onclick="hidePostOTModal()" class="cancel-btn">Cancel</button>
            <button onclick="postOTShift()" class="save-btn">Post OT Shift</button>
        </div>
    </div>
</div>
<!-- OT Member Details Modal -->
<div id="otDetailModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:680px;">
        <div class="modal-header">
            <h2 id="detailMemberName">Member OT History</h2>
            <button class="close-btn" onclick="hideOTDetailModal()">✕</button>
        </div>
        <div style="padding:20px;">
            <div id="otDetailContent" style="max-height:500px; overflow-y:auto;"></div>
        </div>
    </div>
</div>
<!-- OT Edit Modal -->
<div id="otEditModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:480px;">
        <div class="modal-header">
            <h2>Edit OT Shift</h2>
            <button class="close-btn" onclick="hideOTEditModal()">✕</button>
        </div>
        <div style="padding:24px;">
            <input id="editOtDate" type="text" readonly style="width:100%; padding:12px; margin-bottom:12px; background:rgba(255,255,255,0.1);">
            
            <select id="editOtShiftType" style="width:100%; padding:12px; margin-bottom:12px;">
                <option value="Day">Day Shift</option>
                <option value="Night">Night Shift</option>
                <option value="Extra">Extra / Special</option>
            </select>
            
            <select id="editOtArea" style="width:100%; padding:12px; margin-bottom:12px;">
                <!-- Populated by JS -->
            </select>
            
            <div style="margin-bottom:12px;">
                <label style="display:block; margin-bottom:6px; color:#a0d8ff;">Hours</label>
                <input id="editOtHours" type="number" min="1" max="24" step="0.5" 
                       style="width:100%; padding:12px; font-size:1.1rem;">
            </div>
            
            <textarea id="editOtDescription" placeholder="Notes (optional)" 
                      style="width:100%; height:80px; padding:12px; resize:vertical;"></textarea>
        </div>
        
        <div class="form-actions" style="padding:0 24px 24px;">
            <button onclick="hideOTEditModal()" class="cancel-btn">Cancel</button>
            <button onclick="saveOTEdit()" class="save-btn">Save Changes</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
