<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - A Crew</title>
  
  <!-- Favicon -->
<link rel="icon" href="favicon.png" type="image/png">
<link rel="shortcut icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #035747, #022f3a);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      padding: 40px 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(0,199,178,0.3);
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(0,199,178,0.5);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: #00C7B2;
      color: #124352;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 25px;
    }
    .btn:hover { background: #55CE33; }

    /* Remember Me */
    .remember-me {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 10px 0;
      font-size: 0.98rem;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #00C7B2;
    }

    @media (max-width: 480px) {
      .card {
        padding: 35px 25px;
        margin: 15px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Welcome Back</h2>
    
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      
      <!-- Remember Me inside the box -->
      <div class="remember-me">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe">Remember me</label>
      </div>

      <button type="submit" class="btn">Login</button>
    </form>

  </div>

  <script>
    // Safe initialization
    window.addEventListener('load', () => {
      const client = supabase.createClient(
        'https://bwfwnpdjeovqeznwbckx.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ZnducGRqZW92cWV6bndiY2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTI2NzIsImV4cCI6MjA5MTc2ODY3Mn0.QohjsfSgvw64ZwSLRCtr_4rh49JyInEmrpDdzrXISQU'
      );

      console.log("✅ Supabase client initialized");

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('rememberMe').checked;

        console.log("🔄 Attempting login for:", email);

        try {
          const { data, error } = await client.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (error) {
            console.error("❌ Login error:", error);
            alert("Login failed: " + error.message);
          } else {
            console.log("✅ Login successful!", data.user);
            window.location.href = '../dashboard.html';
          }
        } catch (err) {
          console.error("🚨 Unexpected error:", err);
          alert("An unexpected error occurred. Please try again.");
        }
      });
    });
  </script>
</body>
</html>
