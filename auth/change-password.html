<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Change Password - A Crew</title>
  <link rel="icon" href="../favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #035747, #022f3a);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      padding: 40px 35px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(0,199,178,0.3);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(0,199,178,0.5);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: #00C7B2;
      color: #124352;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 20px;
      cursor: pointer;
    }
    .btn:hover { background: #55CE33; }
    .back-link {
      color: #00C7B2;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Change Password</h2>
    <p style="color:#aaa; margin-bottom:25px;">Enter your current and new password</p>

    <form id="changePasswordForm">
      <input type="password" id="currentPassword" placeholder="Current Password" required>
      <input type="password" id="newPassword" placeholder="New Password (min 6 chars)" required>
      <input type="password" id="confirmNewPassword" placeholder="Confirm New Password" required>
      
      <button type="submit" class="btn">Update Password</button>
    </form>

    <a href="../dashboard.html" class="back-link">← Back to Dashboard</a>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      'https://bwfwnpdjeovqeznwbckx.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ZnducGRqZW92cWV6bndiY2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTI2NzIsImV4cCI6MjA5MTc2ODY3Mn0.QohjsfSgvw64ZwSLRCtr_4rh49JyInEmrpDdzrXISQU'
    );

    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmNewPassword = document.getElementById('confirmNewPassword').value;

      if (newPassword !== confirmNewPassword) {
        return alert("New passwords do not match!");
      }
      if (newPassword.length < 6) {
        return alert("New password must be at least 6 characters.");
      }

      try {
        // First verify current password by attempting re-auth
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) throw new Error("Not logged in");

        // Update password
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (error) throw error;

        alert("✅ Password changed successfully!");
        window.location.href = '../dashboard.html';

      } catch (err) {
        console.error(err);
        alert("Failed to change password: " + (err.message || "Unknown error"));
      }
    });
  </script>
</body>
</html>
