<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - A Crew</title>
    
    <!-- Favicon -->
    <link rel="icon" href="../favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="../assets/logo.png">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#00C7B2">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #035747, #022f3a);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            padding: 40px 35px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(0,199,178,0.3);
            text-align: center;
        }
        .logo {
            width: 110px;
            height: 110px;
            margin: 0 auto 25px auto;
            border-radius: 20px;
            object-fit: contain;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }
        p {
            opacity: 0.85;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(0,199,178,0.5);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: #00C7B2;
            color: #124352;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn:hover {
            background: #55CE33;
        }
        .success-msg {
            color: #00ff9d;
            background: rgba(0, 255, 157, 0.2);
            padding: 14px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
        }
        .error-msg {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
            padding: 14px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
        }
        .strength {
            font-size: 0.85rem;
            margin-top: 5px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="../assets/logo.png" alt="A Crew Logo" class="logo">
        <h1>Update Password</h1>
        <p>Create a new secure password for your account</p>

        <form id="updateForm">
            <input type="password" id="newPassword" placeholder="New Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
            
            <div id="message" class="success-msg"></div>
            
            <button type="submit" class="btn" id="submitBtn">Update Password</button>
        </form>
    </div>

    <script>
        // Initialize Supabase
        const supabase = supabase.createClient(
            'https://bwfwnpdjeovqeznwbckx.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ZnducGRqZW92cWV6bndiY2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTI2NzIsImV4cCI6MjA5MTc2ODY3Mn0.QohjsfSgvw64ZwSLRCtr_4rh49JyInEmrpDdzrXISQU'
        );

        const form = document.getElementById('updateForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Basic validation
            if (newPassword.length < 6) {
                showMessage("Password must be at least 6 characters long.", "error");
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Updating...";

            try {
                const { error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    showMessage("Error: " + error.message, "error");
                } else {
                    showMessage("✅ Password updated successfully!", "success");
                    
                    // Redirect to login after success
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2500);
                }
            } catch (err) {
                console.error(err);
                showMessage("An unexpected error occurred.", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Update Password";
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = type === "success" ? "success-msg" : "error-msg";
            messageDiv.style.display = "block";
        }
    </script>
</body>
</html>
