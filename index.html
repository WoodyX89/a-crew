<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Crew</title>
    
    <!-- Favicon -->
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #035747, #022f3a);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            animation: fadeInScale 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .logo {
            width: 130px;
            height: 130px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 25px rgba(0, 255, 157, 0.6));
            animation: 
                logoPop 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                pulseGlow 3s ease-in-out infinite 1.5s;
        }

        .app-name {
            font-size: 3rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -2.5px;
            opacity: 0;
            animation: textFadeIn 1.6s cubic-bezier(0.25, 0.1, 0.25, 1) 0.6s forwards;
        }

        .tagline {
            font-size: 1.15rem;
            opacity: 0;
            margin: 0;
            animation: textFadeIn 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) 1s forwards;
        }

        /* Main entrance animation */
        @keyframes logoPop {
            0% {
                transform: scale(0.2) rotate(-20deg);
                opacity: 0;
            }
            70% {
                transform: scale(1.08) rotate(8deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* Subtle pulsing glow */
        @keyframes pulseGlow {
            0%, 100% {
                filter: drop-shadow(0 0 25px rgba(0, 255, 157, 0.6));
            }
            50% {
                filter: drop-shadow(0 0 45px rgba(0, 255, 157, 0.85));
            }
        }

        @keyframes textFadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            margin: 3.5rem auto 0;
            border-radius: 4px;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #00ff9d, #00e68a);
            animation: progress 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes progress {
            to { width: 100%; }
        }

        .fade-out {
            animation: fadeOut 0.65s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body>

    <div class="splash-container" id="splash">
        <img src="assets/logo.png" alt="A Crew Logo" class="logo">
        <h1 class="app-name">A Crew</h1>
        <p class="tagline">The Best App for the Best Crew - Sponsored by WraptorGuard</p>
        
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>

    <script>
        function redirectToLogin() {
            const splash = document.getElementById('splash');
            splash.classList.add('fade-out');

            setTimeout(() => {
                window.location.href = "auth/login.html";
            }, 750);
        }

        // Total splash duration ≈ 3.3 seconds (smooth & premium feel)
        setTimeout(redirectToLogin, 4000);
    </script>
</body>
</html>
